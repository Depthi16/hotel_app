services:
  - type: web
    name: hotel-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: hotel-db
    plan: free
