{% extends 'base.html' %}

{% block content %}
<div class="container py-5 my-5 fade-in-section">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 border-bottom pb-4">
        <div>
            <h2 class="fw-bold display-6 mb-0 text-dark">Edit Room Type</h2>
            <p class="text-muted mt-2 mb-0">Modify details for <span class="text-primary fw-bold">{{ room.type }}</span>.</p>
        </div>
        <div class="mt-4 mt-md-0">
            <a href="{{ url_for('admin.manage_rooms') }}" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm">
                <i class="fa-solid fa-arrow-left me-2"></i> Cancel & Back
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="custom-card bg-white shadow-sm p-4 p-md-5" style="border-radius: 20px;">
                <form method="POST">
                    <div class="row g-4">
                        <!-- Room Type -->
                        <div class="col-md-6">
                            <label for="type" class="form-label small fw-bold text-muted text-uppercase tracking-wide">Room Type Category</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-bed"></i>
                                <input type="text" class="form-control bg-light border-0 shadow-none" id="type" name="type" value="{{ room.type }}" required>
                            </div>
                        </div>

                        <!-- Price -->
                        <div class="col-md-6">
                            <label for="price" class="form-label small fw-bold text-muted text-uppercase tracking-wide">Nightly Rate (₹)</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-indian-rupee-sign"></i>
                                <input type="number" class="form-control bg-light border-0 shadow-none" id="price" name="price" value="{{ room.price }}" step="0.01" required>
                            </div>
                        </div>

                        <!-- Inventory: Total -->
                        <div class="col-md-6">
                            <label for="total_rooms" class="form-label small fw-bold text-muted text-uppercase tracking-wide">Total Units in Global Inventory</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-boxes-stacked"></i>
                                <input type="number" class="form-control bg-light border-0 shadow-none" id="total_rooms" name="total_rooms" value="{{ room.total_rooms }}" min="1" required>
                            </div>
                        </div>

                        <!-- Inventory: Blocked -->
                        <div class="col-md-6">
                            <label for="blocked_rooms" class="form-label small fw-bold text-muted text-uppercase tracking-wide">Blocked / Maintenance Units</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-ban"></i>
                                <input type="number" class="form-control bg-light border-0 shadow-none" id="blocked_rooms" name="blocked_rooms" value="{{ room.blocked_rooms }}" min="0" required>
                            </div>
                        </div>

                        <!-- Image URL -->
                        <div class="col-12">
                            <label for="image_url" class="form-label small fw-bold text-muted text-uppercase tracking-wide">Primary Gallery Image URL</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-image"></i>
                                <input type="url" class="form-control bg-light border-0 shadow-none" id="image_url" name="image_url" value="{{ room.image_url }}">
                            </div>
                            <div class="mt-3 p-3 bg-light rounded-3 d-flex align-items-center">
                                <img src="{{ room.image_url }}" alt="Preview" class="rounded shadow-sm me-3" style="width: 80px; height: 50px; object-fit: cover;">
                                <span class="small text-muted">Current image preview</span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 pt-4 border-top">
                        <button type="submit" class="btn btn-primary rounded-pill py-3 px-5 fw-bold shadow-sm">
                            Save Changes & Propagate <i class="fa-solid fa-cloud-upload-alt ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
